name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  build:
    name: Build ${{ matrix.target }}
    needs: ci
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cross build --release --target ${{ matrix.target }} -p panaud-cli
          else
            cargo build --release --target ${{ matrix.target }} -p panaud-cli
          fi
        shell: bash

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          ARCHIVE_NAME="panaud-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          tar czf "$ARCHIVE_NAME" -C target/${{ matrix.target }}/release panaud
          echo "ASSET=$ARCHIVE_NAME" >> "$GITHUB_ENV"
        shell: bash

      - name: Package (windows)
        if: matrix.archive == 'zip'
        run: |
          $ARCHIVE_NAME = "panaud-${env:GITHUB_REF_NAME}-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/panaud.exe" -DestinationPath $ARCHIVE_NAME
          echo "ASSET=$ARCHIVE_NAME" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: panaud-${{ matrix.target }}
          path: ${{ env.ASSET }}

  publish:
    name: Publish to crates.io
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish panaud-core
        run: |
          cargo publish -p panaud-core 2>&1 | tee /tmp/publish-core.log || {
            if grep -q "already uploaded" /tmp/publish-core.log; then
              echo "panaud-core already published, skipping"
            else
              exit 1
            fi
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish panaud-cli
        run: |
          cargo publish -p panaud-cli 2>&1 | tee /tmp/publish-cli.log || {
            if grep -q "already uploaded" /tmp/publish-cli.log; then
              echo "panaud-cli already published, skipping"
            else
              exit 1
            fi
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: GitHub Release
    needs: [ci, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  update-homebrew:
    name: Update Homebrew Formula
    needs: [release, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: tzengyuxio/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update Formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          BASE="https://github.com/tzengyuxio/panaud/releases/download/${TAG}"

          sha_arm_mac=$(curl -fsSL "${BASE}/panaud-${TAG}-aarch64-apple-darwin.tar.gz" | sha256sum | awk '{print $1}')
          sha_x86_mac=$(curl -fsSL "${BASE}/panaud-${TAG}-x86_64-apple-darwin.tar.gz" | sha256sum | awk '{print $1}')
          sha_arm_linux=$(curl -fsSL "${BASE}/panaud-${TAG}-aarch64-unknown-linux-gnu.tar.gz" | sha256sum | awk '{print $1}')
          sha_x86_linux=$(curl -fsSL "${BASE}/panaud-${TAG}-x86_64-unknown-linux-gnu.tar.gz" | sha256sum | awk '{print $1}')

          cat > Formula/panaud.rb << 'RUBY'
          class Panaud < Formula
            desc "The Swiss Army knife of audio processing — built for humans and AI agents alike"
            homepage "https://github.com/tzengyuxio/panaud"
            version "__VERSION__"
            license "MIT"

            on_macos do
              on_arm do
                url "__BASE__/panaud-__TAG__-aarch64-apple-darwin.tar.gz"
                sha256 "__SHA_ARM_MAC__"
              end
              on_intel do
                url "__BASE__/panaud-__TAG__-x86_64-apple-darwin.tar.gz"
                sha256 "__SHA_X86_MAC__"
              end
            end

            on_linux do
              on_arm do
                url "__BASE__/panaud-__TAG__-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "__SHA_ARM_LINUX__"
              end
              on_intel do
                url "__BASE__/panaud-__TAG__-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "__SHA_X86_LINUX__"
              end
            end

            def install
              bin.install "panaud"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/panaud --version")
            end
          end
          RUBY

          sed -i 's/^          //' Formula/panaud.rb
          sed -i "s|__VERSION__|${VERSION}|g" Formula/panaud.rb
          sed -i "s|__TAG__|${TAG}|g" Formula/panaud.rb
          sed -i "s|__BASE__|${BASE}|g" Formula/panaud.rb
          sed -i "s|__SHA_ARM_MAC__|${sha_arm_mac}|g" Formula/panaud.rb
          sed -i "s|__SHA_X86_MAC__|${sha_x86_mac}|g" Formula/panaud.rb
          sed -i "s|__SHA_ARM_LINUX__|${sha_arm_linux}|g" Formula/panaud.rb
          sed -i "s|__SHA_X86_LINUX__|${sha_x86_linux}|g" Formula/panaud.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/panaud.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update panaud to ${GITHUB_REF_NAME}"
          git push
