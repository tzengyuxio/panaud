name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish to crates.io
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish panaud-core
        run: |
          cargo publish -p panaud-core 2>&1 | tee /tmp/publish-core.log || {
            if grep -q "already uploaded" /tmp/publish-core.log; then
              echo "panaud-core already published, skipping"
            else
              exit 1
            fi
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish panaud-cli
        run: cargo publish -p panaud-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: GitHub Release
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  update-homebrew:
    name: Update Homebrew Formula
    needs: [release, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: tzengyuxio/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update Formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL_URL="https://github.com/tzengyuxio/panaud/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          SHA256=$(curl -fsSL "${TARBALL_URL}" | sha256sum | awk '{print $1}')

          sed -i "s|url \"https://github.com/tzengyuxio/panaud/archive/refs/tags/.*\.tar\.gz\"|url \"${TARBALL_URL}\"|" Formula/panaud.rb
          sed -i "s/sha256 \"[0-9a-f]\{64\}\"/sha256 \"${SHA256}\"/" Formula/panaud.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/panaud.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update panaud to ${GITHUB_REF_NAME}"
          git push
